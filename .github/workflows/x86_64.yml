on: [push, workflow_dispatch]
name: x86-64 CD Image
jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: Clone Kuroko
        uses: actions/checkout@v4
        with:
          repository: kuroko-lang/kuroko
          path: kuroko
      - name: Clone Bim
        uses: actions/checkout@v4
        with:
          repository: klange/bim
          path: bim
      - name: Download CJK Font (WenQuanYi Micro Hei)
        run: |
          mkdir -p base/usr/share/fonts/truetype/wqy
          curl -L "https://github.com/googlefonts/wenquanyi-micro-hei/raw/main/wqm-micro-hei-regular.ttf" -o base/usr/share/fonts/truetype/wqy/WenQuanYiMicroHei.ttf || \
          wget -O base/usr/share/fonts/truetype/wqy/WenQuanYiMicroHei.ttf "https://sourceforge.net/projects/wqy/files/WenQuanYi%20Micro%20Hei/0.2.0-beta/wqy-microhei-0.2.0-beta.tar.gz/download" || \
          echo "CJK font download failed, will use DejaVu only"
      - name: Set Execute Permissions
        run: find . -name "*.sh" -exec chmod +x {} \;
      - name: Pull Builder Image
        run: docker pull toaruos/build-tools:1.99.x
      - name: Run Builder
        run: docker run -v ${GITHUB_WORKSPACE}:/root/misaka -w /root/misaka -e LANG=C.UTF-8 -t toaruos/build-tools:1.99.x bash util/build-in-docker.sh
      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: image.iso
          path: image.iso
